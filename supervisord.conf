[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:xmrig-proxy]
command=/usr/local/bin/xmrig-proxy --config=/app/config.json
autostart=true
autorestart=true
startsecs=3
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:wstunnel-server]
command=/usr/local/bin/wstunnel server --restrict-to 127.0.0.1:3333 ws://0.0.0.0:8080
autostart=true
autorestart=true
startsecs=5
priority=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
